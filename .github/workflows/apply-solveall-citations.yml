name: Apply SolveAll citation update

on:
  push:
    branches:
      - agent/add-solveall-links

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/add-solveall-links
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Apply manuscript and README citation changes
        run: python scripts/apply_solveall_citations.py
      - name: Validate patch
        run: |
          git diff --check
          grep -Fq '\cite{SolveAllDataSelection}' paper/Samuil_Petkov_F23_Detailed_Proof.tex
          grep -Fq '\bibitem{SolveAllDataSelection}' paper/Samuil_Petkov_F23_Detailed_Proof.tex
          grep -Fq '## Other SolveAll-related projects' README.md
      - name: Commit the generated changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add paper/Samuil_Petkov_F23_Detailed_Proof.tex README.md
          if ! git diff --cached --quiet; then
            git commit -m 'Cite the related SolveAll problem accurately'
            git push origin HEAD:agent/add-solveall-links
          fi
